name: Clean downloads folder!!!!

on:
  workflow_dispatch:
    inputs:
      warning:
        description: '⚠️ WARNING: This will DELETE ALL files inside downloads/ folder. Click "Run workflow" only if you are sure.'
        required: false
        default: 'Read this warning before proceeding'

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove downloads/Unknown_videos folder and recreate it
        run: |
          rm -rf downloads/Unknown_videos
          mkdir downloads/Unknown_videos

      - name: Commit and push empty folder
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add downloads/Unknown_videos
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[AVASAM] Empty downloads/Unknown_videos folder [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin HEAD:"${{ github.ref_name }}"
            echo "✅ downloads folder cleared"
          fi
